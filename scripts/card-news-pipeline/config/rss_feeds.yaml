# 한국 기업 테크 블로그 RSS 피드 매핑.
# rss_aggregator.py 가 이 파일을 읽어 enabled=true 인 피드만 수집한다.
#
# 추가하려면:
#   1. 회사 블로그 메인 페이지에서 <link rel="alternate" type="application/rss+xml"> 확인
#   2. 또는 흔한 경로 시도: /rss, /feed, /feed/, /rss.xml, /atom.xml, /index.xml
#   3. curl -sI <URL> 로 200 확인 후 enabled=true
#
# 참고: https://github.com/maczniak/awesome-korean-techblog
# 참고: https://github.com/seongkyu-lim/TechBlogs

