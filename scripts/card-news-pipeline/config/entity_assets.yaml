# 매칭 임계값
matching:
  min_confidence: 0.6          # 이 이하면 매칭 무시
  case_sensitive: false
  partial_match: true          # "토스 테크" 텍스트에서 "토스" 매칭 허용

# Wikimedia Commons 자동 폴백 (asset_resolver.py 가 사용)
auto_fetch:
  enabled: true
  source: "wikimedia_commons"
  license_filter: ["cc-by", "cc-by-sa", "public-domain"]
  cache_dir: "assets/_auto_fetched/"
