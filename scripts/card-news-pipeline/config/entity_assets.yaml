# entity_assets.yaml — 카드 일러스트의 시각 요소 라이브러리.
# entity_detector.py 가 카드 콘텐츠에서 추출한 이름을 여기 매칭하여
# 후합성용 PNG 자산을 찾는다.
#
# Schema:
#   entities:
#     - canonical_name: 표준 영문/한글 표기
#       type: person | logo | product | team | object
#       aliases: [기사에 등장할 가능성 있는 다양한 표기]
#       asset: assets/<type>/<filename>.png   # 누락 시 ai_with_entity_prompt 모드
#       context: 카드 콘텐츠에 이 단어가 보이면 매칭 신뢰도 상승 (옵션)
#       prompt_hint: AI 폴백 시 사용할 묘사 (옵션)
#
# 매칭 알고리즘 (asset_resolver.py):
#   1. canonical_name + aliases 에 대해 카드 텍스트 부분 문자열 검사
#   2. context 키워드가 함께 보이면 신뢰도 가중
#   3. 다중 매칭 시: primary = 신뢰도 1위, secondary = 2위 (옵션)
#
# 자산 수급 원칙:
#   - 1순위: Wikimedia Commons (CC 라이선스)
#   - 2순위: 공식 보도자료/Press kit
#   - 3순위: 없음 → AI 프롬프트 폴백

